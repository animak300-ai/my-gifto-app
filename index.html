<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подарок</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1c1c27; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; margin: 0; }
        #box { font-size: 100px; cursor: pointer; transition: transform 0.2s; }
        #box:active { transform: scale(0.8); }
    </style>
</head>
<body>
    <div id="text">Нажми на коробку!</div>
    <div id="box">🎁</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        
        document.getElementById('box').addEventListener('click', () => {
            tg.HapticFeedback.impactOccurred('heavy'); // Вибрация
            document.getElementById('box').innerText = '🎉';
            document.getElementById('text').innerText = 'Подарок открыт!';
        });
    </script>
</body>
</html>
